[package]
name = "tokenwatch"
version = "0.2.2"
description = "A macOS menu-bar app for monitoring Claude / Codex token usage per project and workspace."
authors = ["Gabriel Ulloa <gabriel.ulloa.e@gmail.com>"]
license = "MIT"
repository = "https://github.com/gsulloa/tokenwatch"
homepage = "https://github.com/gsulloa/tokenwatch"
edition = "2021"
rust-version = "1.77"

[lib]
name = "tokenwatch_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-window-state = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
tauri-plugin-notification = "2"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
directories = "5"
rusqlite = { version = "0.32", features = ["bundled"] }
glob = "0.3"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"

# Set the Dock icon at runtime on macOS. In dev builds Tauri only assigns the
# Dock icon once at startup, which does not survive the Accessory → Regular
# activation-policy switch we do when opening the dashboard.
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-app-kit = "0.3"
objc2-foundation = "0.3"
tauri-nspanel = { git = "https://github.com/ahkohd/tauri-nspanel", branch = "v2" }

[dev-dependencies]
tempfile = "3"

[features]
keychain = []

[lints.rust]
# tauri-nspanel's `panel_delegate!` macro expands to legacy `objc` macros that
# reference `feature = "cargo-clippy"`, which trips the `unexpected_cfgs` lint.
# Declare it as a known cfg value so only that false positive is silenced.
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(feature, values("cargo-clippy"))'] }

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
