<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="TokenWatch">
  <defs>
    <linearGradient id="tw-bg" x1="80" y1="40" x2="440" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8A5CFF"/>
      <stop offset="1" stop-color="#4A1E9E"/>
    </linearGradient>
    <linearGradient id="tw-gauge" x1="130" y1="150" x2="382" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EEFCFF"/>
      <stop offset="1" stop-color="#79D2FB"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#tw-bg)"/>

  <!-- Speedometer arc, sweeping over the top -->
  <path d="M120.8 326.3 A140 140 0 1 1 391.2 326.3"
        fill="none" stroke="url(#tw-gauge)" stroke-width="30" stroke-linecap="round"/>

  <!-- Threshold ticks -->
  <g stroke="url(#tw-gauge)" stroke-width="9" stroke-linecap="round" opacity="0.85">
    <line x1="155.5" y1="232" x2="134.8" y2="220"/>
    <line x1="256"   y1="174" x2="256"   y2="150"/>
    <line x1="356.5" y1="232" x2="377.2" y2="220"/>
  </g>

  <!-- Needle + hub -->
  <line x1="256" y1="290" x2="313" y2="190"
        stroke="url(#tw-gauge)" stroke-width="17" stroke-linecap="round"/>
  <circle cx="256" cy="290" r="20" fill="#EEFCFF"/>

  <!-- Activity pulse badge -->
  <circle cx="256" cy="404" r="40" fill="rgba(255,255,255,0.12)"/>
  <polyline points="228,404 245,404 252,388 262,420 270,404 284,404"
            fill="none" stroke="#79D2FB" stroke-width="9"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
