name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
            manifest_key: darwin-aarch64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            arch: x64
            manifest_key: darwin-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: linux-x64
            manifest_key: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: windows-x64
            manifest_key: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/app/src-tauri/target
          key: ${{ matrix.os }}-${{ matrix.target }}-cargo-${{ hashFiles('packages/app/src-tauri/Cargo.lock') }}

      - name: Cache apt packages (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ matrix.os }}-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            file \
            wget

      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile

      - name: Import Apple cert into keychain
        if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PWD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" \
            "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign, notarize
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: Developer ID Application
          # Baked into the binary at compile time via option_env! so the
          # feedback form can authenticate to the intake endpoint.
          TOKENWATCH_FEEDBACK_APP_KEY: ${{ secrets.TOKENWATCH_FEEDBACK_APP_KEY }}
        with:
          projectPath: packages/app
          args: --target ${{ matrix.target }}

      - name: Collect artifact paths (macOS)
        if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
        shell: bash
        run: |
          BUNDLE_DIR="packages/app/src-tauri/target/${{ matrix.target }}/release/bundle"
          DMG=$(ls "$BUNDLE_DIR/dmg/"*.dmg | head -1)
          TARBALL=$(ls "$BUNDLE_DIR/macos/"*.app.tar.gz | head -1)
          SIG="${TARBALL}.sig"
          test -f "$DMG"
          test -f "$TARBALL"
          test -f "$SIG"
          VERSION="${{ steps.ver.outputs.version }}"
          BASE_DMG="TokenWatch_${VERSION}_${{ matrix.arch }}.dmg"
          BASE_TARBALL="TokenWatch_${VERSION}_${{ matrix.arch }}.app.tar.gz"
          mkdir -p staging
          cp "$DMG" "staging/$BASE_DMG"
          cp "$TARBALL" "staging/$BASE_TARBALL"
          cp "$SIG" "staging/${BASE_TARBALL}.sig"

      - name: Collect artifact paths (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          # Tauri v2 emits the AppImage itself as the Linux updater artifact
          # (signed as <name>.AppImage.sig). There is no .AppImage.tar.gz.
          # The same AppImage serves as both the installer (download.json) and
          # the updater target (latest.json).
          BUNDLE_DIR="packages/app/src-tauri/target/${{ matrix.target }}/release/bundle"
          APPIMAGE=$(ls "$BUNDLE_DIR/appimage/"*.AppImage | head -1)
          SIG="${APPIMAGE}.sig"
          test -f "$APPIMAGE"
          test -f "$SIG"
          VERSION="${{ steps.ver.outputs.version }}"
          BASE_APPIMAGE="TokenWatch_${VERSION}_x64.AppImage"
          mkdir -p staging
          cp "$APPIMAGE" "staging/$BASE_APPIMAGE"
          cp "$SIG" "staging/${BASE_APPIMAGE}.sig"

      - name: Collect artifact paths (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Tauri v2 signs the MSI itself as the Windows updater artifact
          # (<name>.msi.sig). There is no .msi.zip. The same MSI serves as both
          # the installer (download.json) and the updater target (latest.json).
          BUNDLE_DIR="packages/app/src-tauri/target/${{ matrix.target }}/release/bundle"
          MSI=$(ls "$BUNDLE_DIR/msi/"*.msi | head -1)
          SIG="${MSI}.sig"
          test -f "$MSI"
          test -f "$SIG"
          VERSION="${{ steps.ver.outputs.version }}"
          BASE_MSI="TokenWatch_${VERSION}_x64.msi"
          mkdir -p staging
          cp "$MSI" "staging/$BASE_MSI"
          cp "$SIG" "staging/${BASE_MSI}.sig"

      - name: Upload artifact for downstream job
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.arch }}
          path: staging/
          retention-days: 1

  publish:
    name: Publish to S3 + CloudFront
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC role assumption
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download arm64 bundle
        uses: actions/download-artifact@v4
        with:
          name: bundle-aarch64
          path: staging/

      - name: Download x64 bundle
        uses: actions/download-artifact@v4
        with:
          name: bundle-x64
          path: staging/

      - name: Download linux-x64 bundle
        uses: actions/download-artifact@v4
        with:
          name: bundle-linux-x64
          path: staging/

      - name: Download windows-x64 bundle
        uses: actions/download-artifact@v4
        with:
          name: bundle-windows-x64
          path: staging/

      - name: Verify all four bundles present
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          required=(
            "staging/TokenWatch_${VERSION}_aarch64.dmg"
            "staging/TokenWatch_${VERSION}_aarch64.app.tar.gz"
            "staging/TokenWatch_${VERSION}_aarch64.app.tar.gz.sig"
            "staging/TokenWatch_${VERSION}_x64.dmg"
            "staging/TokenWatch_${VERSION}_x64.app.tar.gz"
            "staging/TokenWatch_${VERSION}_x64.app.tar.gz.sig"
            "staging/TokenWatch_${VERSION}_x64.AppImage"
            "staging/TokenWatch_${VERSION}_x64.AppImage.sig"
            "staging/TokenWatch_${VERSION}_x64.msi"
            "staging/TokenWatch_${VERSION}_x64.msi.sig"
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            fi
          done
          [ "$missing" = "0" ] || { echo "Not all four platform bundles are present; aborting publish."; exit 1; }
          echo "All four platform bundles present."

      - name: Extract release notes
        id: notes
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          CHANGELOG="CHANGELOG.md"
          # Slice the section for ${VERSION} from the root Keep a Changelog file.
          # Headers are of the form: ## [X.Y.Z] - YYYY-MM-DD
          # Capture lines AFTER the matching header up to (but not including) the next ## [.
          awk -v ver="${VERSION}" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0) { found=1; next }
            }
            found { print }
          ' "$CHANGELOG" | sed -e '/./,$!d' -e 's/[[:space:]]*$//' > RELEASE_NOTES.md
          # Emit has_notes output
          if [ -s RELEASE_NOTES.md ] && grep -qP '\S' RELEASE_NOTES.md 2>/dev/null || \
             [ -s RELEASE_NOTES.md ] && grep -q '[^[:space:]]' RELEASE_NOTES.md; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: ${{ steps.notes.outputs.has_notes != 'true' }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            staging/TokenWatch_${{ steps.ver.outputs.version }}_aarch64.dmg
            staging/TokenWatch_${{ steps.ver.outputs.version }}_x64.dmg
            staging/TokenWatch_${{ steps.ver.outputs.version }}_x64.AppImage
            staging/TokenWatch_${{ steps.ver.outputs.version }}_x64.msi

      - name: Build manifest
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          PUBLIC_URL_BASE: ${{ secrets.PUBLIC_URL_BASE }}
          MANIFEST_MODE: ci
          DARWIN_AARCH64_TARBALL: TokenWatch_${{ steps.ver.outputs.version }}_aarch64.app.tar.gz
          DARWIN_AARCH64_SIG_PATH: staging/TokenWatch_${{ steps.ver.outputs.version }}_aarch64.app.tar.gz.sig
          DARWIN_X86_64_TARBALL: TokenWatch_${{ steps.ver.outputs.version }}_x64.app.tar.gz
          DARWIN_X86_64_SIG_PATH: staging/TokenWatch_${{ steps.ver.outputs.version }}_x64.app.tar.gz.sig
          LINUX_X86_64_TARBALL: TokenWatch_${{ steps.ver.outputs.version }}_x64.AppImage
          LINUX_X86_64_SIG_PATH: staging/TokenWatch_${{ steps.ver.outputs.version }}_x64.AppImage.sig
          WINDOWS_X86_64_TARBALL: TokenWatch_${{ steps.ver.outputs.version }}_x64.msi
          WINDOWS_X86_64_SIG_PATH: staging/TokenWatch_${{ steps.ver.outputs.version }}_x64.msi.sig
        run: |
          export PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          node packages/app/scripts/build-manifest.mjs

      - name: Build download.json
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          PUBLIC_URL_BASE: ${{ secrets.PUBLIC_URL_BASE }}
          MANIFEST_MODE: ci
          DARWIN_AARCH64_INSTALLER: TokenWatch_${{ steps.ver.outputs.version }}_aarch64.dmg
          DARWIN_X86_64_INSTALLER: TokenWatch_${{ steps.ver.outputs.version }}_x64.dmg
          LINUX_X86_64_INSTALLER: TokenWatch_${{ steps.ver.outputs.version }}_x64.AppImage
          WINDOWS_X86_64_INSTALLER: TokenWatch_${{ steps.ver.outputs.version }}_x64.msi
        run: |
          export PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          node packages/app/scripts/build-download-manifest.mjs

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload binaries to S3 (long cache)
        env:
          BUCKET: ${{ secrets.RELEASE_S3_BUCKET }}
        run: |
          for f in staging/*; do
            key=$(basename "$f")
            aws s3 cp "$f" "s3://${BUCKET}/${key}" \
              --cache-control "public, max-age=31536000, immutable"
          done

      - name: Upload manifests to S3 (no cache)
        env:
          BUCKET: ${{ secrets.RELEASE_S3_BUCKET }}
        run: |
          aws s3 cp latest.json "s3://${BUCKET}/latest.json" \
            --cache-control "no-cache, max-age=0" \
            --content-type "application/json"
          aws s3 cp download.json "s3://${BUCKET}/download.json" \
            --cache-control "no-cache, max-age=0" \
            --content-type "application/json"

      - name: Invalidate CloudFront manifest cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.RELEASE_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/latest.json" "/download.json"
